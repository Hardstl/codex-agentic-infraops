################################################################################
# Core Model Selection
################################################################################

model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
personality = "pragmatic"

################################################################################
# Instruction Overrides
################################################################################

model_instructions_file = "instructions/validate.md"

################################################################################
# MCP Servers
################################################################################

[mcp_servers.bicep]
command = "dnx"
args = ["Azure.Bicep.McpServer", "--yes"]
enabled = true
