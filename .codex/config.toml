model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "workspace-write"

[windows]
sandbox = "elevated"

[sandbox_workspace_write]
network_access = true

[features]
multi_agent = true
default_mode_request_user_input = true

[agents]
max_threads = 5
max_depth = 1

[agents.research]
config_file = "agents/research.toml"
description = "Microsoft Learn research sub-agent that emits evidence-pack envelopes"

[agents.code]
config_file = "agents/code.toml"
description = "Post-approval coding sub-agent for AVM-first Bicep authoring"

[agents.validate]
config_file = "agents/validate.toml"
description = "Post-authoring Bicep validation sub-agent (fail-closed)"
